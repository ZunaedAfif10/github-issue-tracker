<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-login</title>

    <link rel="stylesheet" href="styles/style.css">

    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <section>
        <div class="hero bg-base-200 min-h-screen">
            <div class="card bg-base-100 w-full max-w-md shrink-0 shadow-2xl">
                <div class="card-body">
                    <img class="block mx-auto my-5" src="assets/github-logo.png" alt="" height="100px" width="100px">
                    <div class="space-y-0">
                        <h1 class="text-center text-xl font-semibold">GitHub Issues Tracker</h1>
                        <p class="text-gray-500 text-center">Sign in to manage your issues</p>
                    </div>
                    <fieldset class="fieldset">
                        <label class="label font-semibold text-black">Username</label>
                        <input id="user" type="email" class="input w-full" placeholder="Username" />
                        <label class="label font-semibold text-black">Password</label>
                        <input id="pass" type="password" class="input w-full" placeholder="Enter Password" />
                        <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
                    </fieldset>

                    <div class="flex items-center my-4">
                        <hr class="flex-grow border-gray-300">
                        <span class="px-3">OR</span>
                        <hr class="flex-grow border-gray-300">
                    </div>
                    <p class="text-gray-400 text-center">Demo Credentials:</p>
                    <div class="bg-gray-100 w-full py-7 text-center">
                        <p><span class="font-semibold">Username:</span> admin</p>
                        <p><span class="font-semibold">Password:</span> admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script/script.js"></script>
</body>

</html>
